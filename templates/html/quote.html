<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family={{--google-query}}&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; background: {{--bg}}; color: {{--text}}; font-family: {{--font-body}}; }
  .bar { width: 100%; height: 12px; background: {{--accent}}; }
  .wrap { padding: 70px 60px 60px; display: flex; flex-direction: column; height: 1338px; }
  .eyebrow { font-family: {{--font-eyebrow}}; font-size: 26px; letter-spacing: 0.18em; color: {{--accent}}; text-transform: uppercase; font-weight: 700; }
  .stars { color: {{--gold}}; font-size: 44px; margin-top: 20px; letter-spacing: 12px; }
  .quote { font-family: {{--font-headline}}; font-size: 64px; line-height: 1.2; color: {{--text}}; margin-top: 80px; font-weight: 700; }
  .attr { margin-top: auto; font-family: {{--font-italic}}; font-size: 30px; color: {{--accent}}; padding-bottom: 4px; }
  .meta { font-family: {{--font-body}}; font-size: 22px; color: {{--text}}; opacity: 0.75; }
  .footer { margin-top: 50px; font-family: {{--font-body}}; font-size: 20px; color: {{--text}}; opacity: 0.7; }
</style></head>
<body>
<div class="bar"></div>
<div class="wrap">
  <div class="eyebrow">{{eyebrow}}</div>
  <div class="stars">&#9733; &#9733; &#9733; &#9733; &#9733;</div>
  <div class="quote">{{quote}}</div>
  <div class="attr">{{attribution}}</div>
  <div class="meta">{{subtitle}}</div>
  <div class="footer">{{handle}}</div>
</div>
</body></html>

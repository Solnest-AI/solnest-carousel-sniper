<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family={{--google-query}}&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; background: {{--dark}}; color: {{--cream}}; font-family: {{--font-body}}; }
  .wrap { width: 1080px; height: 1350px; padding: 90px 60px 60px; display: flex; flex-direction: column; }
  .eyebrow { font-family: {{--font-eyebrow}}; font-size: 24px; letter-spacing: 0.18em; color: {{--gold}}; text-transform: uppercase; font-weight: 700; }
  .headline { font-family: {{--font-headline}}; font-size: 92px; line-height: 1.05; margin-top: 24px; color: {{--cream}}; font-weight: 700; }
  .divider { width: 200px; height: 2px; background: {{--gold}}; margin: 50px 0 40px; }
  ul { list-style: none; display: flex; flex-direction: column; gap: 24px; }
  li { display: flex; align-items: center; justify-content: space-between; font-size: 32px; }
  li .label { font-family: {{--font-body}}; color: {{--cream}}; }
  li .value { font-family: {{--font-eyebrow}}; font-size: 20px; color: {{--gold}}; border: 1.5px solid {{--gold}}; border-radius: 24px; padding: 6px 22px; }
  .closer { margin-top: auto; font-family: {{--font-italic}}; font-size: 28px; line-height: 1.4; color: {{--cream}}; opacity: 0.75; padding-bottom: 60px; }
  .footer { font-family: {{--font-body}}; font-size: 20px; color: {{--cream}}; opacity: 0.7; }
</style></head>
<body><div class="wrap">
  <div class="eyebrow">{{eyebrow}}</div>
  <div class="headline">{{headline}}</div>
  <div class="divider"></div>
  <ul>{{items}}</ul>
  <div class="closer">{{closer}}</div>
  <div class="footer">{{handle}}</div>
</div></body></html>
